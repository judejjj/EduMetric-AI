{% extends 'base.html' %}

{% block title %}Edit Department{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex items-center space-x-4 mb-6">
        <a href="{% url 'admin_dashboard' %}"
            class="glass-panel px-4 py-2 rounded-lg text-gray-400 hover:text-white transition-colors">
            &larr; Back
        </a>
        <div>
            <h1 class="text-2xl font-bold text-white">Edit Department</h1>
            <p class="text-emerald-400 text-sm">Update details for {{ dept.name }}</p>
        </div>
    </div>

    <div class="glass-panel p-8 rounded-xl max-w-xl mx-auto">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Department Name</label>
                <input type="text" name="name" value="{{ dept.name }}" required
                    class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Department Code</label>
                <input type="text" name="code" value="{{ dept.code }}" required
                    class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
            </div>

            <button type="submit"
                class="w-full mt-8 py-3 px-4 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 
                rounded-xl font-bold text-white shadow-lg shadow-emerald-500/20 transition-all duration-200 transform hover:-translate-y-1">
                UPDATE DEPARTMENT
            </button>
        </form>
    </div>
</div>
{% endblock %}
