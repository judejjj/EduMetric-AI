{% extends 'base.html' %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex items-center space-x-4 mb-6">
        <a href="{% url 'admin_dashboard' %}"
            class="glass-panel px-4 py-2 rounded-lg text-gray-400 hover:text-white transition-colors">
            &larr; Back
        </a>
        <div>
            <h1 class="text-2xl font-bold text-white">Edit User</h1>
            <p class="text-pink-400 text-sm">Update details for {{ edit_user.username }}</p>
        </div>
    </div>

    <div class="glass-panel p-8 rounded-xl max-w-2xl mx-auto">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" value="{{ edit_user.username }}" required
                        class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" value="{{ edit_user.email }}"
                        class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Password (Leave blank to
                    keep current)</label>
                <input type="password" name="password"
                    class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Role</label>
                    <select name="role" required class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                        {% for code, name in roles %}
                        {% if edit_user.role == code %}
                        <option value="{{ code }}" class="bg-slate-800 text-white" selected>{{ name }}</option>
                        {% else %}
                        <option value="{{ code }}" class="bg-slate-800 text-white">{{ name }}</option>
                        {% endif %}
                        {% endfor %}
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Department</label>
                    <select name="department_id" class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                        <option value="" class="bg-slate-800 text-gray-500">None (Admin only)</option>
                        {% for dept in departments %}
                        {% if edit_user.department.id == dept.id %}
                        <option value="{{ dept.id }}" class="bg-slate-800 text-white" selected>
                            {{ dept.code }} - {{ dept.name }}
                        </option>
                        {% else %}
                        <option value="{{ dept.id }}" class="bg-slate-800 text-white">
                            {{ dept.code }} - {{ dept.name }}
                        </option>
                        {% endif %}
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit"
                class="w-full mt-8 py-3 px-4 bg-gradient-to-r from-pink-600 to-orange-600 hover:from-pink-500 hover:to-orange-500 
                rounded-xl font-bold text-white shadow-lg shadow-pink-500/20 transition-all duration-200 transform hover:-translate-y-1">
                UPDATE USER
            </button>
        </form>
    </div>
</div>
{% endblock %}
