{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass-panel p-8 rounded-xl text-center space-y-6">
        <div class="text-red-500 mb-6">
            <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-white">Are you sure?</h2>
        <p class="text-gray-300">
            You are about to delete <span class="text-white font-semibold">{{ item }}</span>.
            This action cannot be undone.
        </p>

        <div class="flex justify-center space-x-4 mt-8">
            <a href="{% url back_url %}"
                class="px-6 py-2 rounded-lg bg-gray-600 hover:bg-gray-500 text-white font-medium transition-colors">
                Cancel
            </a>

            <form method="post" class="inline">
                {% csrf_token %}
                <button type="submit"
                    class="px-6 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-white font-medium shadow-lg shadow-red-500/20 transition-colors">
                    Delete
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
