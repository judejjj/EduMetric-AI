{% extends 'base.html' %}

{% block title %}Add New User{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex items-center space-x-4 mb-6">
        <a href="{% url 'staff_dashboard' %}"
            class="glass-panel px-4 py-2 rounded-lg text-gray-400 hover:text-white transition-colors">
            &larr; Back to Dashboard
        </a>
        <div>
            <h1 class="text-2xl font-bold text-white">Add New User</h1>
            <p class="text-pink-400 text-sm">Create Student or Teacher for your Department</p>
        </div>
    </div>

    <div class="glass-panel p-8 rounded-xl max-w-2xl mx-auto">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" required
                        class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600" placeholder="e.g. john_doe">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600"
                        placeholder="john@example.com">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Password (Optional)</label>
                <input type="password" name="password" class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600"
                    placeholder="Defaults to username if empty">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Role</label>
                <select name="role" required class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                    {% if target_role == "student" %}
                        <option value="STUDENT" class="bg-slate-800 text-white" selected>Student</option>
                        <option value="TEACHER" class="bg-slate-800 text-white">Teacher</option>
                    {% elif target_role == "teacher" %}
                        <option value="STUDENT" class="bg-slate-800 text-white">Student</option>
                        <option value="TEACHER" class="bg-slate-800 text-white" selected>Teacher</option>
                    {% else %}
                        <option value="STUDENT" class="bg-slate-800 text-white">Student</option>
                        <option value="TEACHER" class="bg-slate-800 text-white">Teacher</option>
                    {% endif %}
                </select>
            </div>

            {% if classes %}
            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Class Section (For Students)</label>
                <select name="class_id" class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                    <option value="" class="bg-slate-800 text-gray-500">Select Class...</option>
                    {% for c in classes %}
                    <option value="{{ c.id }}" class="bg-slate-800 text-white">{{ c.name }}</option>
                    {% endfor %}
                </select>
                <p class="text-xs text-gray-500">* Leave empty if adding a Teacher</p>
            </div>
            {% endif %}

            <button type="submit"
                class="w-full mt-8 py-3 px-4 bg-gradient-to-r from-pink-600 to-orange-600 hover:from-pink-500 hover:to-orange-500 
                rounded-xl font-bold text-white shadow-lg shadow-pink-500/20 transition-all duration-200 transform hover:-translate-y-1">
                CREATE USER
            </button>
        </form>
    </div>
</div>
{% endblock %}
