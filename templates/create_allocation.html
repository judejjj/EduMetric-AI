{% extends 'base.html' %}

{% block title %}New Allocation{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex items-center space-x-4 mb-6">
        <a href="{% url 'admin_dashboard' %}"
            class="glass-panel px-4 py-2 rounded-lg text-gray-400 hover:text-white transition-colors">
            &larr; Back
        </a>
        <div>
            <h1 class="text-2xl font-bold text-white">Create Allocation</h1>
            <p class="text-blue-400 text-sm">Assign a Teacher to a Subject and Class</p>
        </div>
    </div>

    <div class="glass-panel p-8 rounded-xl max-w-2xl mx-auto">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Teacher</label>
                <select name="teacher_id" required class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                    <option value="" class="bg-slate-800 text-gray-500">Select Teacher</option>
                    {% for teacher in teachers %}
                    <option value="{{ teacher.id }}" class="bg-slate-800 text-white">{{ teacher.username }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Subject</label>
                <select name="subject_id" required class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                    <option value="" class="bg-slate-800 text-gray-500">Select Subject</option>
                    {% for subject in subjects %}
                    <option value="{{ subject.id }}" class="bg-slate-800 text-white">{{ subject.name }} ({{ subject.code
                        }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Class Section</label>
                <select name="class_section_id" required class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                    <option value="" class="bg-slate-800 text-gray-500">Select Section</option>
                    {% for section in class_sections %}
                    <option value="{{ section.id }}" class="bg-slate-800 text-white">{{ section.name }} ({{
                        section.department.code }})</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit"
                class="w-full mt-8 py-3 px-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 
                rounded-xl font-bold text-white shadow-lg shadow-purple-500/20 transition-all duration-200 transform hover:-translate-y-1">
                CREATE ALLOCATION
            </button>
        </form>
    </div>
</div>
{% endblock %}
