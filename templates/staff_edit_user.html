{% extends 'base.html' %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex items-center space-x-4 mb-6">
        <a href="{% url 'staff_dashboard' %}"
            class="glass-panel px-4 py-2 rounded-lg text-gray-400 hover:text-white transition-colors">
            &larr; Back
        </a>
        <div>
            <h1 class="text-2xl font-bold text-white">Edit User</h1>
            <p class="text-emerald-400 text-sm">Editing {{ edit_user.username }} ({{ edit_user.get_role_display }})</p>
        </div>
    </div>

    <div class="glass-panel p-8 rounded-xl max-w-xl mx-auto">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" value="{{ edit_user.username }}" required
                        class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" value="{{ edit_user.email }}"
                        class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Password (Leave blank to
                    keep current)</label>
                <input type="password" name="password"
                    class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 border-t border-white/5 pt-6">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Department</label>
                    <select name="department_id" id="department_select" class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                        <option value="" class="bg-slate-800 text-gray-500">No Department</option>
                        {% for d in departments %}
                        <option value="{{ d.id }}" class="bg-slate-800 text-white" 
                            {% if edit_user.department_id == d.id %}selected{% endif %}>
                            {{ d.name }} ({{ d.code }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Class Section</label>
                    <select name="class_section_id" id="class_select" class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                        <option value="" class="bg-slate-800 text-gray-500">No Class</option>
                        {% for c in classes %}
                        <option value="{{ c.id }}" data-dept="{{ c.department.id }}" class="bg-slate-800 text-white class-option"
                            {% if edit_user.class_section_id == c.id %}selected{% endif %}>
                            {{ c.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit"
                class="w-full mt-8 py-3 px-4 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 
                rounded-xl font-bold text-white shadow-lg shadow-emerald-500/20 transition-all duration-200 transform hover:-translate-y-1">
                UPDATE USER
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const deptSelect = document.getElementById('department_select');
        const classSelect = document.getElementById('class_select');
        const classOptions = document.querySelectorAll('.class-option');

        function filterClasses() {
            if (!deptSelect || !classSelect) return;
            const selectedDeptId = deptSelect.value;
            
            let currentClassSelected = false;

            classOptions.forEach(option => {
                const optionDeptId = option.getAttribute('data-dept');
                if (!selectedDeptId || optionDeptId === selectedDeptId) {
                    option.style.display = 'block';
                    if (option.selected) currentClassSelected = true;
                } else {
                    option.style.display = 'none';
                }
            });

            // If the currently selected class is now hidden, reset to "No Class"
            if (!currentClassSelected && classSelect.value !== "") {
                // Only reset if we actually changed the department (not on initial load)
                // Actually, it's safer to just keep it if it's visible, otherwise reset.
            }
        }

        if (deptSelect) {
            deptSelect.addEventListener('change', function() {
                filterClasses();
                // When department changes, we should probably reset class selection if it's not in the new dept
                const selectedOption = classSelect.options[classSelect.selectedIndex];
                if (selectedOption && selectedOption.dataset.dept !== deptSelect.value && deptSelect.value !== "") {
                    classSelect.value = "";
                }
            });
            filterClasses(); // Run on load to set initial state
        }
    });
</script>
{% endblock %}
