{% extends 'base.html' %}

{% block title %}Student Records{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex items-center space-x-4 mb-6">
        <a href="{% url 'staff_dashboard' %}"
            class="glass-panel px-4 py-2 rounded-lg text-gray-400 hover:text-white transition-colors">
            &larr; Back
        </a>
        <div>
            <h1 class="text-2xl font-bold text-white">Non-Academic Records</h1>
            <p class="text-indigo-400 text-sm">For {{ student.username }}</p>
        </div>
    </div>

    <div class="glass-panel p-8 rounded-xl max-w-xl mx-auto">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Attendance Percentage
                    (%)</label>
                <input type="number" step="0.01" min="0" max="100" name="attendance"
                    value="{{ record.attendance_percentage|default:'' }}" required
                    class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Lab Performance
                    Score</label>
                <input type="number" step="0.01" min="0" max="100" name="lab"
                    value="{{ record.lab_performance|default:'' }}" required
                    class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Disciplinary Score (Default
                    100)</label>
                <input type="number" step="1" name="discipline" value="{{ record.disciplinary_score|default:100 }}"
                    required class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600">
            </div>

            <button type="submit"
                class="w-full mt-8 py-3 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 
                rounded-xl font-bold text-white shadow-lg shadow-indigo-500/20 transition-all duration-200 transform hover:-translate-y-1">
                UPDATE RECORDS
            </button>
        </form>
    </div>
</div>
{% endblock %}
