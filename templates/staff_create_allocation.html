{% extends 'base.html' %}

{% block title %}Assign Teachers{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex items-center space-x-4 mb-6">
        <a href="{% url 'staff_dashboard' %}"
            class="glass-panel px-4 py-2 rounded-lg text-gray-400 hover:text-white transition-colors">
            &larr; Back
        </a>
        <div>
            <h1 class="text-2xl font-bold text-white">Assign Teachers</h1>
            <p class="text-pink-400 text-sm">Allocate Subject -> Class -> Teacher</p>
        </div>
    </div>

    <div class="glass-panel p-8 rounded-xl max-w-xl mx-auto">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Select Class</label>
                <select name="class_section_id" id="classSelect" required
                    class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                    <option value="" class="bg-slate-800 text-gray-500">Select Class...</option>
                    {% for c in classes %}
                    <option value="{{ c.id }}" class="bg-slate-800 text-white">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Select Subject</label>
                <select name="subject_id" id="subjectSelect" required
                    class="w-full glass-input py-2 px-1 text-lg bg-transparent" disabled>
                    <option value="" class="bg-slate-800 text-gray-500">Select Class First</option>
                    <!-- Populated via JS -->
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Teacher</label>
                <select name="teacher_id" required class="w-full glass-input py-2 px-1 text-lg bg-transparent">
                    {% for t in teachers %}
                    <option value="{{ t.id }}" class="bg-slate-800 text-white">{{ t.username }}</option>
                    {% empty %}
                    <option class="bg-slate-800 text-gray-500">No teachers found in dept</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit"
                class="w-full mt-8 py-3 px-4 bg-gradient-to-r from-pink-600 to-orange-600 hover:from-pink-500 hover:to-orange-500 
                rounded-xl font-bold text-white shadow-lg shadow-pink-500/20 transition-all duration-200 transform hover:-translate-y-1">
                CREATE ALLOCATION
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('classSelect').addEventListener('change', function () {
        const classId = this.value;
        const subjectSelect = document.getElementById('subjectSelect');

        // Reset subject dropdown
        subjectSelect.innerHTML = '<option value="" class="bg-slate-800 text-gray-500">Loading...</option>';
        subjectSelect.disabled = true;

        if (classId) {
            fetch(`{% url 'get_subjects_by_class' %}?class_id=${classId}`)
                .then(response => response.json())
                .then(data => {
                    subjectSelect.innerHTML = '<option value="" class="bg-slate-800 text-gray-500">Select Subject...</option>';
                    if (data.subjects.length > 0) {
                        data.subjects.forEach(subject => {
                            const option = document.createElement('option');
                            option.value = subject.id;
                            option.textContent = `${subject.name} (${subject.code})`;
                            option.className = 'bg-slate-800 text-white';
                            subjectSelect.appendChild(option);
                        });
                        subjectSelect.disabled = false;
                    } else {
                        subjectSelect.innerHTML = '<option value="" class="bg-slate-800 text-gray-500">No subjects found for this class</option>';
                    }
                })
                .catch(error => {
                    console.error('Error fetching subjects:', error);
                    subjectSelect.innerHTML = '<option value="" class="bg-slate-800 text-gray-500">Error loading subjects</option>';
                });
        } else {
            subjectSelect.innerHTML = '<option value="" class="bg-slate-800 text-gray-500">Select Class First</option>';
            subjectSelect.disabled = true;
        }
    });
</script>
{% endblock %}
