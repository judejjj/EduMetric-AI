{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="glass-panel p-8 rounded-2xl w-full max-w-md transform hover:scale-[1.01] transition-all duration-300">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                System Access</h2>
            <p class="text-gray-400 mt-2 text-sm">Valid Credentials Required</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            {% if form.errors %}
            <div class="p-3 rounded bg-red-500/20 border border-red-500/50 text-red-200 text-sm text-center">
                Invalid username or password
            </div>
            {% endif %}

            <div class="space-y-1">
                <label for="id_username"
                    class="text-xs font-semibold text-blue-400 uppercase tracking-wider">Username</label>
                <input type="text" name="username" id="id_username" required
                    class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600 focus:placeholder-gray-400"
                    placeholder="Enter ID">
            </div>

            <div class="space-y-1">
                <label for="id_password"
                    class="text-xs font-semibold text-purple-400 uppercase tracking-wider">Password</label>
                <input type="password" name="password" id="id_password" required
                    class="w-full glass-input py-2 px-1 text-lg placeholder-gray-600 focus:placeholder-gray-400"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full mt-8 py-3 px-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 
                rounded-xl font-bold text-white shadow-lg shadow-purple-500/20 transition-all duration-200 transform hover:-translate-y-1">
                AUTHENTICATE
            </button>
        </form>

        <div class="mt-6 text-center text-xs text-gray-500">
            Restricted Access. Unauthorized attempts will be logged.
        </div>
    </div>
</div>
{% endblock %}
