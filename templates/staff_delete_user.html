{% extends 'base.html' %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="glass-panel p-8 rounded-xl max-w-md w-full text-center space-y-6">
        <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                </path>
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-white">Delete Student?</h2>
        <p class="text-gray-400">
            Are you sure you want to delete <span class="text-white font-bold">{{ student.username }}</span>?
            This action cannot be undone and will remove all their records.
        </p>

        <form method="post" class="flex flex-col gap-3 mt-6">
            {% csrf_token %}
            <button type="submit"
                class="w-full py-3 px-4 bg-red-600 hover:bg-red-500 rounded-lg font-bold text-white shadow-lg shadow-red-500/20 transition-all">
                Yes, Delete Student
            </button>

            <a href="{% url 'staff_dashboard' %}"
                class="w-full py-3 px-4 bg-white/10 hover:bg-white/20 rounded-lg font-bold text-gray-300 transition-all">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
